services:
  app:
    build: .
    image: recipe-bookmark-app
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
