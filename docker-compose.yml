services:
  app:
    build: .
    image: recipe-bookmark-app
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html

  web:
    image: nginx:alpine
    # 公開ポートは .env の WEB_PUBLISH で制御（未設定なら 8080）。
    # 例) ローカル別ポート: WEB_PUBLISH=8081 / 前段nginx配下: WEB_PUBLISH=127.0.0.1:8090
    ports:
      - "${WEB_PUBLISH:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
