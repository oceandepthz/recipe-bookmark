server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # セキュリティヘッダ（全レスポンスに付与）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 任意: Content-Security-Policy（多層防御）。
    # 本文は HTMLPurifier でサニタイズ済み。有効化する場合は以下を調整して使う。
    # - style: Pico.css(CDN) と インライン<style>/style属性 を許可
    # - img:   レシピサイトの外部画像を許可（https と data:）
    # - script: 削除確認の inline onsubmit があるため 'unsafe-inline' が必要
    #   （より厳格にするなら該当のインラインハンドラを撤去してから 'unsafe-inline' を外す）
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
